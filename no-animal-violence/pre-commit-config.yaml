# Pre-commit configuration for No Animal Violence language checks
# Add this to your project's .pre-commit-config.yaml
repos:
  - repo: https://github.com/Open-Paws/no-animal-violence-pre-commit
    rev: main
    hooks:
      - id: no-animal-violence
        name: No Animal Violence Language Scanner
        description: Detect language that normalizes violence toward animals
        stages: [pre-commit]
