repos:
  - repo: local
    hooks:
      - id: unicode-integrity-check
        name: Unicode integrity check (Rules File Backdoor detection)
        language: python
        entry: python3 scripts/check-unicode-integrity.py
        pass_filenames: false
        types: []
        files: \.(md|yaml|yml|json|cursorrules|mdc)$
        always_run: true
  - repo: https://github.com/Open-Paws/no-animal-violence-pre-commit
    rev: v0.2.0
    hooks:
      - id: no-animal-violence
